version: '3.8'

# Docker Compose для разработки с hot-reload
# Использование: docker-compose -f docker-compose.dev.yml up

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: booking_service
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/booking_service?schema=public
      PORT: 3001
      NODE_ENV: development
    ports:
      - "3001:3001"
    volumes:
      # Монтируем исходный код для hot-reload
      - ./backend/src:/app/src:ro
      - ./backend/prisma:/app/prisma:ro
      # Не монтируем node_modules и dist из хоста
      - /app/node_modules
      - /app/dist
    depends_on:
      postgres:
        condition: service_healthy
    # Используем ts-node-dev для автоматического перезапуска
    command: ["sh", "-c", "npx prisma generate && npx prisma db push --accept-data-loss && npm run db:seed && npm run dev"]

  frontend:
    build: ./frontend
    environment:
      VITE_API_URL: http://localhost:3001/api
    ports:
      - "3000:3000"
    volumes:
      # Монтируем исходный код для HMR
      - ./frontend/src:/app/src:ro
      - ./frontend/public:/app/public:ro
      - ./frontend/index.html:/app/index.html:ro
      - ./frontend/vite.config.ts:/app/vite.config.ts:ro
      - ./frontend/tsconfig.json:/app/tsconfig.json:ro
      # Не монтируем node_modules и dist из хоста
      - /app/node_modules
      - /app/dist
    depends_on:
      - backend

volumes:
  postgres_data:
